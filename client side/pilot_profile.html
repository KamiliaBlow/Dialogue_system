<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pilot Profile - AC6 Briefing</title>
  <style>
    @font-face {
      font-family: 'Orbitron';
      src: local('Orbitron'), url('./styles/Orbitron-Light.ttf') format('truetype');
      font-weight: 300;
      font-style: normal;
    }
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --bg: #050508;
      --screen-bg: rgba(18, 18, 28, 0.85);
      --screen-border: rgba(255, 107, 53, 0.35);
      --screen-glow: rgba(255, 107, 53, 0.15);
      --text: #d8d8f0;
      --text-dim: #787895;
      --accent: #ff6b35;
      --success: #00f5a0;
      --grid-line: rgba(100, 100, 130, 0.12);
    }

    /* Green Theme */
    .theme-green {
      --screen-border: rgba(3, 251, 141, 0.35);
      --screen-glow: rgba(3, 251, 141, 0.15);
      --accent: #03FB8D;
      --success: #00f5a0;
    }

    .theme-green .bg-grid { display: none; }

    .code-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; display: none;
    }
    .theme-green .code-overlay { display: block; }

    .code-line {
      font-family: 'Share Tech Mono', monospace; font-size: 14px; color: rgba(3, 251, 141, 0.15);
      white-space: nowrap; position: absolute; animation: codeScroll 20s linear infinite;
    }
    @keyframes codeScroll {
      0% { transform: translateY(-100%); opacity: 0; }
      10% { opacity: 1; } 90% { opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0; }
    }

    .theme-green .vignette { background: radial-gradient(ellipse at center, transparent 20%, rgba(5,5,8,0.7) 100%); }
    .theme-green .scanlines { background: repeating-linear-gradient(0deg, transparent 2px, rgba(3, 251, 141, 0.03) 2px, rgba(3, 251, 141, 0.03) 4px); }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: auto;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
    }

    body {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 150px 150px;
      z-index: 0;
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(5,5,8,0.95) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,0.2) 2px, rgba(0,0,0,0.2) 4px
      );
      pointer-events: none;
      z-index: 2;
      opacity: 0.5;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      z-index: 100;
      background: linear-gradient(180deg, rgba(5,5,8,0.9) 0%, transparent 100%);
    }

    .header-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 4px;
      opacity: 0.8;
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-user span {
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .btn-logout {
      padding: 0.4rem 1rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: inherit;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 900px;
      margin: 100px auto 40px;
      padding: 0 2rem;
      width: 100%;
    }

    .page-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 2rem;
      text-align: center;
    }

    .theme-selector {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 1rem;
      background: var(--screen-bg);
      border: 1px solid var(--screen-border);
    }

    .theme-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border: 1px solid var(--screen-border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .theme-option:hover {
      border-color: var(--accent);
    }

    .theme-option.active {
      border-color: var(--accent);
      background: rgba(255, 107, 53, 0.1);
    }

    .theme-option.active.green {
      border-color: #03FB8D;
      background: rgba(3, 251, 141, 0.1);
    }

    .theme-color {
      width: 20px;
      height: 20px;
      border-radius: 3px;
    }

    .theme-color.yellow {
      background: #ff6b35;
    }

    .theme-color.green {
      background: #03FB8D;
    }

    .slots-container {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .slot-card {
      flex: 1;
      background: var(--screen-bg);
      border: 1px solid var(--screen-border);
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .slot-card:hover {
      border-color: var(--accent);
    }

    .slot-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--screen-glow);
    }

    .slot-card.empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 180px;
      border-style: dashed;
      opacity: 0.6;
    }

    .slot-number {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .slot-card.active .slot-number {
      color: var(--accent);
    }

    .slot-callsign {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      color: var(--text);
      margin-bottom: 0.5rem;
      font-weight: bold;
    }

    .slot-mech {
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .slot-empty-icon {
      font-size: 2rem;
      color: var(--accent);
      opacity: 0.5;
      margin-bottom: 0.5rem;
    }

    .slot-empty-text {
      font-size: 0.85rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .profile-editor {
      background: var(--screen-bg);
      border: 1px solid var(--screen-border);
      padding: 2rem;
      box-shadow: 0 0 30px var(--screen-glow);
    }

    .editor-header {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--screen-border);
    }

    .editor-content {
      display: flex;
      gap: 2rem;
    }

    .avatar-section {
      flex-shrink: 0;
    }

    .avatar-preview {
      width: 150px;
      height: 150px;
      border: 2px solid var(--accent);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-preview .placeholder {
      font-size: 3rem;
      color: var(--accent);
      opacity: 0.5;
    }

    .avatar-upload {
      display: none;
    }

    .avatar-upload-label {
      display: block;
      padding: 0.6rem 1.2rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: inherit;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .avatar-upload-label:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .form-section {
      flex: 1;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--screen-border);
      color: var(--text);
      padding: 0.75rem;
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-input::placeholder {
      color: var(--text-dim);
      opacity: 0.5;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--screen-border);
    }

    .btn {
      padding: 0.75rem 2rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: inherit;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-primary:hover {
      box-shadow: 0 0 20px var(--screen-glow);
    }

    .btn-danger {
      border-color: #ff375f;
      color: #ff375f;
    }

    .btn-danger:hover {
      background: #ff375f;
      color: var(--bg);
    }

    .btn-success {
      border-color: var(--success);
      color: var(--success);
    }

    .btn-success:hover {
      background: var(--success);
      color: var(--bg);
      box-shadow: 0 0 20px rgba(0,245,160,0.3);
    }

    .hidden {
      display: none !important;
    }

    .message {
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }

    .message.error {
      background: rgba(255, 55, 95, 0.2);
      border: 1px solid #ff375f;
      color: #ff375f;
    }

    .message.success {
      background: rgba(0, 245, 160, 0.2);
      border: 1px solid var(--success);
      color: var(--success);
    }

    .back-link {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: var(--text-dim);
      font-size: 0.85rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      z-index: 100;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="code-overlay" id="codeOverlay"></div>
  <div class="vignette"></div>
  <div class="scanlines"></div>

  <header class="header">
    <div class="header-title">◈ PILOT PROFILE ◈</div>
    <div class="header-user">
      <span id="usernameDisplay"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="container">
    <h1 class="page-title">Mission Pilot Selection</h1>

    <div class="theme-selector">
      <div class="theme-option" data-theme="yellow" onclick="setTheme('yellow')">
        <div class="theme-color yellow"></div>
        <span>Yellow Theme</span>
      </div>
      <div class="theme-option" data-theme="green" onclick="setTheme('green')">
        <div class="theme-color green"></div>
        <span>Green Theme</span>
      </div>
    </div>

    <div class="slots-container" id="slotsContainer"></div>

    <div class="profile-editor hidden" id="profileEditor">
      <div class="editor-header">Edit Pilot Profile - Slot <span id="editorSlotNumber"></span></div>
      
      <div id="editorMessage"></div>

      <div class="editor-content">
        <div class="avatar-section">
          <div class="avatar-preview" id="avatarPreview">
            <span class="placeholder">◈</span>
          </div>
          <input type="file" id="avatarUpload" class="avatar-upload" accept="image/*" onchange="handleAvatarUpload(event)">
          <label for="avatarUpload" class="avatar-upload-label">Upload Avatar</label>
        </div>

        <div class="form-section">
          <div class="form-group">
            <label class="form-label">Callsign (Pilot Name) *</label>
            <input type="text" class="form-input" id="callsignInput" placeholder="e.g., RAVEN">
          </div>

          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="fullNameInput" placeholder="e.g., Unknown Pilot">
          </div>

          <div class="form-group">
            <label class="form-label">Mech Name *</label>
            <input type="text" class="form-input" id="mechNameInput" placeholder="e.g., STEEL HUNTER">
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-success" onclick="setActiveProfile()">Set as Active</button>
        <button class="btn btn-primary" onclick="saveProfile()">Save Profile</button>
        <button class="btn btn-danger" onclick="deleteProfile()">Delete</button>
      </div>
    </div>
  </div>

  <a href="Qwen_html_20260315_hmm0zlm42.html" class="back-link">← Back to Briefing</a>

  <script>
    let API_URL = 'https://' + window.location.hostname + ':3000/api';
    let currentProfiles = [];
    let selectedSlot = null;
    let uploadedAvatarPath = null;

    function getAvatarUrl(path) {
      if (!path) return null;
      if (path.startsWith('http')) return path;
      return 'https://' + window.location.hostname + ':3000' + path;
    }

    async function loadConfig() {
      try {
        const timestamp = Date.now();
        const module = await import(`./scripts/config.js?t=${timestamp}`);
        API_URL = module.default.API_URL;
      } catch (error) {
        console.warn('Config load failed, using default:', error);
      }
    }

    async function loadTheme() {
      try {
        const response = await fetch(`${API_URL}/user-settings`, { credentials: 'include' });
        const data = await response.json();
        if (data.theme === 'green') {
          document.body.classList.add('theme-green');
          initCodeOverlay();
        }
      } catch (e) {
        console.warn('Failed to load theme:', e);
      }
    }

    function initCodeOverlay() {
      const overlay = document.getElementById('codeOverlay');
      if (!overlay || overlay.children.length > 0) return;
      const codePatterns = ['MOV EAX, [EBP+08h]', 'LEA ESI, [EDI+100h]', 'PUSH ECX', 'POP EDX', 'ADD EAX, EBX', 'SUB ECX, 10h', 'INC ESI', 'DEC EDI', 'AND EAX, 0Fh', 'OR EBX, EAX', 'XOR ECX, EDX', 'NOT EAX', 'SHL EAX, 02h', 'SHR EBX, 04h', 'CMP EAX, EBX', 'TEST ECX, EDI', 'JMP 00401000h', 'JE 00401020h', 'JNE 00401040h', 'JG 00401060h', 'PUSHAD', 'POPAD', 'CALL 00401000h', 'RET', 'NOP', 'INT 80h', 'SYSENTER', 'SYSCALL', 'CPUID', 'RDTSC'];
      for (let i = 0; i < 30; i++) {
        const line = document.createElement('div');
        line.className = 'code-line';
        line.textContent = codePatterns[Math.floor(Math.random() * codePatterns.length)];
        line.style.left = Math.random() * 100 + '%';
        line.style.top = (Math.random() * 100 - 20) + '%';
        line.style.animationDelay = Math.random() * 5 + 's';
        line.style.animationDuration = (15 + Math.random() * 10) + 's';
        overlay.appendChild(line);
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await loadConfig();
      await checkAuth();
      loadProfiles();
      loadTheme();
    });

    async function loadTheme() {
      try {
        const response = await fetch(`${API_URL}/user-settings`, { credentials: 'include' });
        const data = await response.json();
        if (data.theme) {
          applyTheme(data.theme);
          if (data.theme === 'green') {
            document.body.classList.add('theme-green');
            initCodeOverlay();
          } else {
            document.body.classList.remove('theme-green');
          }
        }
      } catch (e) {
        console.warn('Failed to load theme:', e);
      }
    }

    async function setTheme(theme) {
      try {
        const response = await fetch(`${API_URL}/user-settings`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ theme: theme })
        });
        const data = await response.json();
        if (data.theme) {
          applyTheme(data.theme);
          if (data.theme === 'green') {
            document.body.classList.add('theme-green');
            initCodeOverlay();
          } else {
            document.body.classList.remove('theme-green');
          }
        }
      } catch (e) {
        console.error('Failed to save theme:', e);
      }
    }

    function applyTheme(theme) {
      document.querySelectorAll('.theme-option').forEach(el => {
        el.classList.remove('active');
        if (el.dataset.theme === theme) {
          el.classList.add('active');
        }
      });
    }

    async function checkAuth() {
      try {
        const response = await fetch(`${API_URL}/check-auth`, { credentials: 'include' });
        const data = await response.json();
        
        if (!data.isAuthenticated) {
          window.location.href = 'login.html';
          return;
        }
        
        document.getElementById('usernameDisplay').textContent = data.username;
      } catch (e) {
        console.error('Auth check failed:', e);
        window.location.href = 'login.html';
      }
    }

    async function loadProfiles() {
      try {
        const response = await fetch(API_URL + '/pilot-profiles', { credentials: 'include' });
        const data = await response.json();
        
        currentProfiles = data.profiles;
        renderSlots();
      } catch (e) {
        console.error('Failed to load profiles:', e);
      }
    }

    function renderSlots() {
      const container = document.getElementById('slotsContainer');
      container.innerHTML = '';

      currentProfiles.forEach(profile => {
        const slot = document.createElement('div');
        const isEmpty = !profile.callsign;
        
        slot.className = `slot-card ${isEmpty ? 'empty' : ''} ${profile.is_active ? 'active' : ''}`;
        slot.onclick = () => selectSlot(profile.slot_number);
        
        if (isEmpty) {
          slot.innerHTML = `
            <span class="slot-number">Slot ${profile.slot_number}</span>
            <span class="slot-empty-icon">◈</span>
            <span class="slot-empty-text">Empty Slot</span>
          `;
        } else {
          const avatarUrl = getAvatarUrl(profile.avatar_path);
          const avatarHtml = avatarUrl 
            ? `<img src="${avatarUrl}" alt="${profile.callsign}" style="width:100%;height:100%;object-fit:cover;">`
            : `<span style="font-size:1.5rem;color:var(--accent);opacity:0.5;">◈</span>`;
          slot.innerHTML = `
            <span class="slot-number">Slot ${profile.slot_number}</span>
            <div style="width:50px;height:50px;border:1px solid var(--accent);border-radius:3px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);margin-bottom:0.5rem;">
              ${avatarHtml}
            </div>
            <div class="slot-callsign">${profile.callsign}</div>
            <div class="slot-mech">AC: ${profile.mech_name}</div>
          `;
        }
        
        container.appendChild(slot);
      });
    }

    function selectSlot(slotNumber) {
      selectedSlot = slotNumber;
      const profile = currentProfiles.find(p => p.slot_number === slotNumber);
      
      document.getElementById('profileEditor').classList.remove('hidden');
      document.getElementById('editorSlotNumber').textContent = slotNumber;
      document.getElementById('editorMessage').innerHTML = '';
      
      document.getElementById('callsignInput').value = profile?.callsign || '';
      document.getElementById('fullNameInput').value = profile?.full_name || '';
      document.getElementById('mechNameInput').value = profile?.mech_name || '';
      
      uploadedAvatarPath = profile?.avatar_path || null;
      
      const avatarPreview = document.getElementById('avatarPreview');
      const avatarUrl = getAvatarUrl(profile?.avatar_path);
      if (avatarUrl) {
        avatarPreview.innerHTML = `<img src="${avatarUrl}" alt="Avatar">`;
      } else {
        avatarPreview.innerHTML = '<span class="placeholder">◈</span>';
      }
      
      renderSlots();
    }

    async function saveProfile() {
      const callsign = document.getElementById('callsignInput').value.trim();
      const fullName = document.getElementById('fullNameInput').value.trim();
      const mechName = document.getElementById('mechNameInput').value.trim();
      
      if (!callsign) {
        showMessage('Callsign is required', 'error');
        return;
      }
      
      if (!mechName) {
        showMessage('Mech name is required', 'error');
        return;
      }
      
      try {
        const response = await fetch(API_URL + '/pilot-profiles', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            slot_number: selectedSlot,
            callsign: callsign,
            full_name: fullName,
            mech_name: mechName,
            avatar_path: uploadedAvatarPath
          })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          showMessage('Profile saved successfully', 'success');
          loadProfiles();
        } else {
          showMessage(data.message || 'Failed to save profile', 'error');
        }
      } catch (e) {
        showMessage('Error saving profile', 'error');
      }
    }

    async function deleteProfile() {
      if (!confirm('Are you sure you want to delete this profile?')) return;
      
      try {
        const response = await fetch(API_URL + `/pilot-profiles/${selectedSlot}`, {
          method: 'DELETE',
          credentials: 'include'
        });
        
        if (response.ok) {
          showMessage('Profile deleted', 'success');
          document.getElementById('profileEditor').classList.add('hidden');
          loadProfiles();
        } else {
          const data = await response.json();
          showMessage(data.message || 'Failed to delete profile', 'error');
        }
      } catch (e) {
        showMessage('Error deleting profile', 'error');
      }
    }

    async function setActiveProfile() {
      try {
        const response = await fetch(API_URL + `/pilot-profiles/set-active/${selectedSlot}`, {
          method: 'POST',
          credentials: 'include'
        });
        
        if (response.ok) {
          showMessage('Active profile set', 'success');
          loadProfiles();
        } else {
          const data = await response.json();
          showMessage(data.message || 'Failed to set active profile', 'error');
        }
      } catch (e) {
        showMessage('Error setting active profile', 'error');
      }
    }

    async function handleAvatarUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const formData = new FormData();
      formData.append('avatar', file);
      
      try {
        const response = await fetch(API_URL + `/pilot-profiles/upload-avatar/${selectedSlot}`, {
          method: 'POST',
          credentials: 'include',
          body: formData
        });
        
        const data = await response.json();
        
        if (response.ok) {
          uploadedAvatarPath = data.avatar_path;
          const avatarPreview = document.getElementById('avatarPreview');
          // Use full_url if available, otherwise construct URL
          const avatarSrc = data.full_url || getAvatarUrl(data.avatar_path);
          avatarPreview.innerHTML = `<img src="${avatarSrc}" alt="Avatar">`;
          showMessage('Avatar uploaded', 'success');
        } else {
          showMessage(data.message || 'Failed to upload avatar', 'error');
        }
      } catch (e) {
        showMessage('Error uploading avatar', 'error');
      }
    }

    function showMessage(text, type) {
      const container = document.getElementById('editorMessage');
      container.innerHTML = `<div class="message ${type}">${text}</div>`;
    }

    async function logout() {
      try {
        await fetch(API_URL + '/logout', { method: 'POST', credentials: 'include' });
        window.location.href = 'login.html';
      } catch (e) {
        window.location.href = 'login.html';
      }
    }
  </script>
</body>
</html>
