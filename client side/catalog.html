<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог персонажей - Терминал GMS-4521</title>
    <link href="https://fonts.googleapis.com/css?family=Orbitron:700" rel="stylesheet">
    <link rel="stylesheet" href="styles/admin-styles.css">
    <link rel="stylesheet" href="styles/editor-styles.css">
    <style>
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .catalog-card {
            background-color: var(--bg-card);
            border: 1px solid var(--primary-border);
            padding: 15px;
            position: relative;
            transition: border-color 0.3s;
        }
        .catalog-card:hover {
            border-color: var(--primary-color);
        }
        .catalog-card-portrait {
            width: 120px;
            height: 120px;
            margin: 0 auto 10px;
            overflow: hidden;
            border: 1px solid var(--primary-border);
            position: relative;
            background: rgba(0,0,0,0.3);
        }
        .catalog-card-portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .catalog-card-name {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .catalog-card-relation {
            text-align: center;
            font-size: 12px;
            color: rgba(3, 251, 141, 0.7);
            margin-bottom: 10px;
        }
        .catalog-card-actions {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .catalog-card-actions .btn {
            flex: 1;
            min-width: 0;
            white-space: nowrap;
        }
        .catalog-empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(3, 251, 141, 0.5);
            font-size: 14px;
        }
        .catalog-header-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .catalog-portrait-upload {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .catalog-portrait-preview {
            width: 200px;
            height: 200px;
            border: 1px solid var(--primary-border);
            overflow: hidden;
            position: relative;
            background: rgba(0,0,0,0.3);
        }
        .catalog-portrait-preview img {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform-origin: center center;
        }
        .portrait-editor-inline {
            margin-top: 8px;
        }
        .portrait-editor-inline .portrait-control-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }
        .portrait-editor-inline .portrait-control-row label {
            min-width: 70px;
            font-size: 11px;
        }
        .portrait-editor-inline .portrait-control-row input[type="range"] {
            flex: 1;
        }
        .portrait-editor-inline .portrait-control-row span {
            min-width: 40px;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="background-code" id="bgCode"></div>
    
    <div class="container">
        <header class="admin-header">
            <div class="admin-title">ТЕРМИНАЛ GMS-4521 - КАТАЛОГ ПЕРСОНАЖЕЙ</div>
            <div class="header-buttons">
                <a href="editor.html" class="btn">Редактор</a>
                <a href="admin.html" class="btn">Админ-панель</a>
                <button id="logout-btn" class="admin-logout">ВЫХОД</button>
            </div>
        </header>
        
        <div class="catalog-header-actions">
            <button id="add-character-btn" class="btn">+ Новый персонаж</button>
            <button id="init-relations-btn" class="btn btn-secondary" title="Создать записи отношений для всех персонажей и всех пользователей">Инициализировать отношения</button>
        </div>
        
        <div id="catalog-grid" class="catalog-grid">
            <div class="catalog-empty">Загрузка персонажей...</div>
        </div>
    </div>
    
    <div id="character-modal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-title" id="modal-title">Новый персонаж</div>
            <div class="modal-body">
                <input type="hidden" id="character-id">
                <div class="form-row">
                    <div class="form-group">
                        <label>Имя персонажа:</label>
                        <input type="text" id="character-name" class="form-input" placeholder="Введите имя">
                    </div>
                    <div class="form-group">
                        <label>Базовое отношение:</label>
                        <input type="number" id="character-default-relation" class="form-input" value="0" min="-100" max="100" step="5">
                        <div class="form-help">Значение для новых игроков (-100 до +100)</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Портрет:</label>
                        <div class="catalog-portrait-upload">
                            <select id="character-portrait-select" class="form-input">
                                <option value="">Выберите файл...</option>
                            </select>
                            <div class="upload-section">
                                <input type="file" id="upload-portrait" accept="image/*" class="hidden">
                                <button id="upload-portrait-btn" class="btn btn-small">Загрузить новый</button>
                            </div>
                            <div class="catalog-portrait-preview" id="portrait-preview-container">
                                <img id="portrait-preview-img" src="" alt="" style="display:none;">
                            </div>
                            <div class="portrait-editor-inline">
                                <div class="portrait-control-row">
                                    <label>Масштаб:</label>
                                    <input type="range" id="portrait-scale" min="50" max="300" value="100" step="1">
                                    <span id="portrait-scale-value">100%</span>
                                </div>
                                <div class="portrait-control-row">
                                    <button type="button" id="portrait-mirror-btn" class="btn btn-small">↔ Зеркально</button>
                                    <button type="button" id="portrait-center-btn" class="btn btn-small">⊕ Центрировать</button>
                                    <button type="button" id="portrait-reset-btn" class="btn btn-small">↺ Сброс</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button id="cancel-character" class="btn">Отмена</button>
                <button id="save-character-btn" class="btn">Сохранить</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно: Отношения с игроками -->
    <div id="relations-modal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-title" id="relations-modal-title">Отношения с игроками</div>
            <div class="modal-body">
                <div id="relations-loading" class="loading" style="display:none;">
                    <div class="loading-spinner"></div>
                </div>
                <div id="relations-content" style="display:none;">
                    <table class="user-table" style="width:100%;">
                        <thead>
                            <tr>
                                <th>Игрок</th>
                                <th style="width:120px;">Значение</th>
                                <th style="width:70px;"></th>
                            </tr>
                        </thead>
                        <tbody id="relations-tbody"></tbody>
                    </table>
                </div>
            </div>
            <div class="modal-actions">
                <button id="close-relations-modal" class="btn">Закрыть</button>
            </div>
        </div>
    </div>
    
    <script type="module" src="scripts/catalog.js"></script>
</body>
</html>
